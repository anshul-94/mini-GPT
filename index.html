<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern Dark AI SaaS Palette */
            --bg-main: radial-gradient(circle at center, #1a2238 0%, #0b0f1a 60%, #05070f 100%);
            --sidebar-bg: #020617;
            --sidebar-hover: #0f172a;
            
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            
            --accent: #22c55e; /* Professional Green */
            --accent-hover: #16a34a;
            
            --input-bg: #0f172a;
            --input-border: #1f2937;
            --input-focus: rgba(34, 197, 94, 0.2);
            
            --bubble-user: #1e293b;
            --bubble-bot: #111827;
            --bubble-border: #1f2937;
            
            --sidebar-width: 260px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-bubble: 18px;
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: var(--transition);
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--bubble-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 16px;
            z-index: 10;
        }

        .app-name {
            font-size: 18px;
            font-weight: 700;
            padding: 12px;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--bubble-border);
            background-color: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
            margin-bottom: 24px;
        }

        .new-chat-btn:hover {
            background-color: var(--sidebar-hover);
            border-color: var(--text-secondary);
            transform: translateY(-1px);
        }

        .history-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 8px 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #chat-history {
            flex: 1;
            overflow-y: auto;
            margin-top: 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: var(--transition);
            margin-bottom: 4px;
        }

        .history-item:hover {
            background-color: var(--sidebar-hover);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .history-item.active {
            background-color: var(--sidebar-hover);
            color: var(--text-primary);
            border: 1px solid var(--bubble-border);
        }

        /* --- MAIN AREA --- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Welcome Screen */
        #welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        .welcome-sub {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        /* Chat Messages */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 48px 0;
            display: none;
        }

        #messages {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message {
            display: flex;
            gap: 20px;
            animation: fadeIn 0.4s var(--transition) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .message.bot .avatar {
            background-color: var(--accent);
            color: #052e16;
        }

        .message.user .avatar {
            background-color: #334155;
            color: #f1f5f9;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .msg-content {
            max-width: 85%;
            line-height: 1.6;
            font-size: 15px;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: var(--radius-bubble);
            border: 1px solid var(--bubble-border);
            transition: var(--transition);
        }

        .bubble:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .message.user .bubble {
            background-color: var(--bubble-user);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background-color: var(--bubble-bot);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* Typing Indicator */
        #typing {
            display: none;
            padding: 12px 24px;
            max-width: 800px;
            margin: 0 auto;
            color: var(--text-secondary);
            font-size: 13px;
            font-style: italic;
        }

        /* --- INPUT AREA --- */
        #input-area {
            padding: 24px;
            background: linear-gradient(to top, var(--sidebar-bg), transparent);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: var(--transition);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .input-container:hover, .input-container:focus-within {
            border-color: var(--text-secondary);
            box-shadow: 0 0 0 1px var(--input-focus), 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            outline: none;
            padding: 4px 0;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        #send-btn {
            background-color: var(--accent);
            color: #052e16;
            border: none;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0.3;
            pointer-events: none;
        }

        #send-btn.active {
            opacity: 1;
            pointer-events: all;
        }

        #send-btn.active:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar {
                display: none;
            }
            .welcome-title { font-size: 28px; }
            .input-container { margin: 0 12px; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="app-name">Assistant</div>
        <div class="new-chat-btn" id="new-chat-btn">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            New Chat
        </div>
        <div class="history-label">History</div>
        <div id="chat-history"></div>
    </aside>

    <main id="main-content">
        <div id="welcome-screen">
            <h1 class="welcome-title">What would you like to know?</h1>
            <p class="welcome-sub">Ask anything, your AI assistant is ready.</p>
        </div>

        <div id="chat-container">
            <div id="messages"></div>
            <div id="typing">AI is thinking...</div>
        </div>

        <div id="input-area">
            <div class="input-container">
                <textarea id="user-input" rows="1" placeholder="Ask anything..."></textarea>
                <button id="send-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        'use strict';

        const S = {
            sessions: [],
            activeId: null,
            isLoading: false
        };

        const $ = id => document.getElementById(id);
        const D = {
            history: $('chat-history'),
            welcome: $('welcome-screen'),
            chatContainer: $('chat-container'),
            messages: $('messages'),
            input: $('user-input'),
            sendBtn: $('send-btn'),
            newBtn: $('new-chat-btn'),
            typing: $('typing')
        };

        /* --- UTILS --- */
        const uid = () => Math.random().toString(36).slice(2, 9);
        
        function scrollBottom() {
            D.chatContainer.scrollTop = D.chatContainer.scrollHeight;
        }

        /* --- SESSIONS --- */
        function newSession() {
            const sess = { id: uid(), title: 'New Chat', messages: [] };
            S.sessions.unshift(sess);
            activateSession(sess.id);
            renderHistory();
        }

        function activateSession(id) {
            S.activeId = id;
            const sess = S.sessions.find(s => s.id === id);
            if (!sess) return;

            if (sess.messages.length === 0) {
                D.welcome.style.display = 'flex';
                D.chatContainer.style.display = 'none';
            } else {
                D.welcome.style.display = 'none';
                D.chatContainer.style.display = 'block';
                renderMessages(sess.messages);
            }
            renderHistory();
        }

        function renderHistory() {
            D.history.innerHTML = '';
            S.sessions.forEach(s => {
                const el = document.createElement('div');
                el.className = `history-item ${s.id === S.activeId ? 'active' : ''}`;
                el.textContent = s.title;
                el.onclick = () => activateSession(s.id);
                D.history.appendChild(el);
            });
        }

        /* --- MESSAGES --- */
        function renderMessages(messages) {
            D.messages.innerHTML = '';
            messages.forEach(m => appendMessageUI(m));
            scrollBottom();
        }

        function appendMessageUI(m) {
            const msgRow = document.createElement('div');
            msgRow.className = `message ${m.role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = m.role === 'user' ? 'U' : 'AI';

            const content = document.createElement('div');
            content.className = 'msg-content';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = m.content;

            content.appendChild(bubble);
            msgRow.appendChild(avatar);
            msgRow.appendChild(content);
            D.messages.appendChild(msgRow);
        }

        async function sendMessage() {
            const text = D.input.value.trim();
            if (!text || S.isLoading) return;

            const sess = S.sessions.find(s => s.id === S.activeId);
            if (!sess) return;

            // First message sets title
            if (sess.messages.length === 0) {
                sess.title = text.length > 25 ? text.substring(0, 25) + '...' : text;
                D.welcome.style.display = 'none';
                D.chatContainer.style.display = 'block';
            }

            const uMsg = { role: 'user', content: text };
            sess.messages.push(uMsg);
            appendMessageUI(uMsg);
            
            D.input.value = '';
            D.input.style.height = 'auto';
            D.sendBtn.classList.remove('active');
            
            S.isLoading = true;
            D.typing.style.display = 'block';
            scrollBottom();

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                const bMsg = { role: 'bot', content: data.reply || data.message || "I'm sorry, I couldn't process that." };
                sess.messages.push(bMsg);
                
                D.typing.style.display = 'none';
                appendMessageUI(bMsg);
                scrollBottom();
                renderHistory();
            } catch (e) {
                D.typing.style.display = 'none';
                const eMsg = { role: 'bot', content: "Error connecting to server. Please ensure the backend is running." };
                sess.messages.push(eMsg);
                appendMessageUI(eMsg);
            } finally {
                S.isLoading = false;
            }
        }

        /* --- LISTENERS --- */
        D.input.oninput = () => {
            D.input.style.height = 'auto';
            D.input.style.height = Math.min(D.input.scrollHeight, 200) + 'px';
            D.sendBtn.classList.toggle('active', D.input.value.trim().length > 0);
        };

        D.input.onkeydown = (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                sendMessage(); 
            } 
        };

        D.sendBtn.onclick = sendMessage;
        D.newBtn.onclick = newSession;

        /* --- INIT --- */
        newSession();
        D.input.focus();

    </script>
</body>
</html>
